set -g mouse on
set -g base-index 1
set -g escape-time 0
set -g history-limit 5000
set -g default-terminal "tmux-256color"
set -g renumber-windows on
set -g set-titles off

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'accessd/tmux-agent-indicator'

set -g @scroll-without-changing-pane on
set -g @emulate-scroll-for-no-mouse-alternate-buffer on
set -g @scroll-speed-num-lines-per-scroll 1

# Catppuccin (alle @-Optionen VOR run)
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# Catppuccin laden
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status line (NACH catppuccin run, mit #{E:} Format)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# TPM
if-shell '[ -f /opt/homebrew/opt/tpm/share/tpm/tpm ]' {
  run '/opt/homebrew/opt/tpm/share/tpm/tpm'
} {
  run '/usr/local/opt/tpm/share/tpm/tpm'
}

# Nicht-@ Optionen NACH den run-Befehlen
set -g automatic-rename off
set -g allow-rename off
